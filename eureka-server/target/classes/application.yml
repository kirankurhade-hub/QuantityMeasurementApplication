server:
  port: 8761

spring:
  application:
    name: eureka-server
  boot:
    admin:
      client:
        url: ${SPRING_BOOT_ADMIN_CLIENT_URL:http://localhost:9090}
        instance:
          prefer-ip: true

eureka:
  client:
    register-with-eureka: false
    fetch-registry: false
  server:
    wait-time-in-ms-when-sync-empty: 0

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,env,loggers,threaddump,beans,mappings
  endpoint:
    health:
      show-details: always

info:
  app:
    name: eureka-server
    description: Service discovery registry for the Quantity Measurement platform
    version: 1.0.0
