server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: auth-route
          uri: lb://user-service
          predicates:
            - Path=/auth/**
        - id: oauth2-route
          uri: lb://user-service
          predicates:
            - Path=/oauth2/**
        - id: login-route
          uri: lb://user-service
          predicates:
            - Path=/login/**
        - id: measurement-v1-route
          uri: lb://measurement-service
          predicates:
            - Path=/api/v1/quantities/**
        - id: measurement-route
          uri: lb://measurement-service
          predicates:
            - Path=/api/convert/**
        - id: measurement-history-route
          uri: lb://measurement-service
          predicates:
            - Path=/api/measurements/**
        - id: user-route
          uri: lb://user-service
          predicates:
            - Path=/api/users/**

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}
    fetch-registry: true
    register-with-eureka: true
  instance:
    prefer-ip-address: true
    lease-renewal-interval-in-seconds: 10
    lease-expiration-duration-in-seconds: 30

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway,metrics,env,loggers,threaddump
  endpoint:
    health:
      show-details: always
