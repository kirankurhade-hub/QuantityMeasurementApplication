services:
  eureka-server:
    image: ${DOCKERHUB_USERNAME:-asynchronouskrishna}/qm-eureka-server:latest
    build:
      context: .
      dockerfile: eureka-server/Dockerfile
    ports:
      - "8761:8761"
    environment:
      SPRING_BOOT_ADMIN_CLIENT_URL: http://admin-server:9090
    networks:
      - qm-network

  admin-server:
    image: ${DOCKERHUB_USERNAME:-asynchronouskrishna}/qm-admin-server:latest
    build:
      context: .
      dockerfile: admin-server/Dockerfile
    ports:
      - "9090:9090"
    environment:
      EUREKA_URL: http://eureka-server:8761/eureka/
    depends_on:
      eureka-server:
        condition: service_started
    networks:
      - qm-network

  measurement-service:
    image: ${DOCKERHUB_USERNAME:-asynchronouskrishna}/qm-measurement-service:latest
    build:
      context: .
      dockerfile: measurement-service/Dockerfile
    ports:
      - "8081:8081"
    environment:
      SPRING_DATASOURCE_URL: ${MEASUREMENT_DATASOURCE_URL:-jdbc:postgresql://ep-royal-pond-adar8bsz-pooler.c-2.us-east-1.aws.neon.tech/QuantityMeasurement?sslmode=require&channelBinding=require}
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: org.postgresql.Driver
      SPRING_DATASOURCE_USERNAME: ${MEASUREMENT_DATASOURCE_USERNAME:-neondb_owner}
      SPRING_DATASOURCE_PASSWORD: ${MEASUREMENT_DATASOURCE_PASSWORD:-npg_JVdmz0AI1xRU}
      EUREKA_URL: http://eureka-server:8761/eureka/
    depends_on:
      eureka-server:
        condition: service_started
    networks:
      - qm-network

  user-service:
    image: ${DOCKERHUB_USERNAME:-asynchronouskrishna}/qm-user-service:latest
    build:
      context: .
      dockerfile: user-service/Dockerfile
    ports:
      - "8082:8082"
    environment:
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL:-jdbc:postgresql://ep-royal-pond-adar8bsz-pooler.c-2.us-east-1.aws.neon.tech/QuantityMeasurement?sslmode=require&channelBinding=require}
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: org.postgresql.Driver
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME:-neondb_owner}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD:-npg_JVdmz0AI1xRU}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-placeholder-google-client-id}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-placeholder-google-client-secret}
      APP_REDIRECT_URI: ${APP_REDIRECT_URI:-http://localhost:3000/auth}
      APP_JWT_SECRET: ${APP_JWT_SECRET:-VGhpc0lzQVNlY3VyZVNob3VsZEJlQXRMZWFzdDMyQ2hhcmFjdGVyc0xvbmdGb3JKV1Q=}
      EUREKA_URL: http://eureka-server:8761/eureka/
    depends_on:
      eureka-server:
        condition: service_started
    networks:
      - qm-network

  api-gateway:
    image: ${DOCKERHUB_USERNAME:-asynchronouskrishna}/qm-api-gateway:latest
    build:
      context: .
      dockerfile: api-gateway/Dockerfile
    ports:
      - "8080:8080"
    environment:
      EUREKA_URL: http://eureka-server:8761/eureka/
    depends_on:
      eureka-server:
        condition: service_started
      user-service:
        condition: service_started
      measurement-service:
        condition: service_started
    networks:
      - qm-network

  frontend:
    image: ${DOCKERHUB_USERNAME:-asynchronouskrishna}/qm-frontend:latest
    build:
      context: ../QuantityMeasurementApp-Frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      api-gateway:
        condition: service_started
    networks:
      - qm-network

networks:
  qm-network:
    driver: bridge
