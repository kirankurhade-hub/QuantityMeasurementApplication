spring.application.name=quantity-measurement-app

# Server Configuration
server.address=0.0.0.0
server.port=8080

# ==================== AWS RDS MySQL Database ====================
spring.datasource.url=jdbc:mysql://database-1.c6fy08wce2qz.us-east-1.rds.amazonaws.com/QMA?createDatabaseIfNotExist=true&useSSL=true&requireSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=admin
spring.datasource.password=admin123456

# Connection Pool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# Spring Data JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# CORS - allow S3 frontend and localhost
cors.allowed.origins=http://qma-frontend09.s3-website-us-east-1.amazonaws.com,http://localhost:3000,http://localhost:8080

# Frontend URL
frontend.url=http://qma-frontend09.s3-website-us-east-1.amazonaws.com

# Swagger UI
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# Actuator
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always
management.endpoints.web.base-path=/actuator

# ==================== JWT Configuration ====================
jwt.secret=dGhpc0lzQVlTY3JlZXRLZXlGb3JKV1RUb2tlbkdlbmVyYXRpb25BbmRWYWxpZGF0aW9u
jwt.expiration=86400000

