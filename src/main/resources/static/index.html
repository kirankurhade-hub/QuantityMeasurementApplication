<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quantity Measurement App</title>
</head>
<body>
  <script>
    (async () => {
      try {
        const token = localStorage.getItem("qm_access_token");
        const headers = token ? { Authorization: `Bearer ${token}` } : {};
        const response = await fetch("/auth/status", { headers });
        const data = await response.json().catch(() => ({}));
        const target = data.authenticated ? "/pages/measurement/index.html" : "/pages/auth/index.html";
        window.location.replace(target);
      } catch {
        window.location.replace("/pages/auth/index.html");
      }
    })();
  </script>
</body>
</html>
