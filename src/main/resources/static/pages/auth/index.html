<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quantity Measurement App Auth</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../assets/css/auth.css">
</head>
<body>
  <main class="auth-shell">
    <section class="auth-layout">
      <div class="brand-card">
        <div class="brand-illustration">
          <div class="brand-circle">
            <div class="brand-logo" aria-hidden="true">
              <svg viewBox="0 0 240 240" role="presentation" focusable="false">
                <circle cx="120" cy="18" r="12" fill="#0b0b0b"></circle>
                <rect x="112" y="30" width="16" height="18" rx="7" fill="#0b0b0b"></rect>
                <rect x="108" y="48" width="24" height="58" rx="8" fill="#2c78d0"></rect>
                <path d="M38 72c12-12 28-14 48-8 24 8 38 8 68-2 17-6 31-4 48 10" fill="none" stroke="#0b0b0b" stroke-width="12" stroke-linecap="round"></path>
                <path d="M40 72c2 10 2 16-4 24" fill="none" stroke="#0b0b0b" stroke-width="8" stroke-linecap="round"></path>
                <path d="M201 73c-2 10-2 16 4 24" fill="none" stroke="#0b0b0b" stroke-width="8" stroke-linecap="round"></path>
                <rect x="112" y="98" width="16" height="102" rx="8" fill="#0b0b0b"></rect>
                <path d="M112 98c4-9 12-9 16 0" fill="#0b0b0b"></path>
                <path d="M44 98v16" stroke="#18b837" stroke-width="4" stroke-linecap="round"></path>
                <path d="M196 98v16" stroke="#0b0b0b" stroke-width="4" stroke-linecap="round"></path>
                <path d="M44 114v18M34 114l-8 48M54 114l28 48" stroke="#1c1c1c" stroke-width="1.6" stroke-linecap="round"></path>
                <path d="M196 114v18M186 114l-28 48M206 114l8 48" stroke="#1c1c1c" stroke-width="1.6" stroke-linecap="round"></path>
                <path d="M20 164c16 10 49 10 65 0-7 19-17 28-32 28s-26-9-33-28Z" fill="#0b0b0b"></path>
                <path d="M157 164c16 10 49 10 65 0-7 19-17 28-32 28s-26-9-33-28Z" fill="#0b0b0b"></path>
                <path d="M20 164c22-4 44-4 65 0" fill="#2c78d0"></path>
                <path d="M157 164c22-4 44-4 65 0" fill="#2c78d0"></path>
                <path d="M96 200h48c10 0 16 4 16 10v12H80v-12c0-6 6-10 16-10Z" fill="#0b0b0b"></path>
                <path d="M90 222h60c14 0 24 4 24 10v8H66v-8c0-6 10-10 24-10Z" fill="#0b0b0b"></path>
                <path d="M105 201h30l-6 10h-18l-6-10Z" fill="#2c78d0"></path>
              </svg>
            </div>
          </div>
        </div>
        <h1>QUANTITY MEASUREMENT APP</h1>
      </div>

      <section class="form-card">
        <div class="tabs" role="tablist" aria-label="Authentication tabs">
          <button class="tab-button" id="loginTab" type="button" role="tab" aria-selected="false" aria-controls="loginPanel">LOGIN</button>
          <button class="tab-button active" id="signupTab" type="button" role="tab" aria-selected="true" aria-controls="signupPanel">SIGNUP</button>
        </div>

        <form class="form-panel hidden" id="loginPanel" novalidate>
          <label class="field-label" for="loginEmail">Email Id</label>
          <input class="field-input" id="loginEmail" type="email" required maxlength="80" autocomplete="email">

          <label class="field-label" for="loginPassword">Password</label>
          <div class="password-wrap">
            <input class="field-input" id="loginPassword" type="password" required minlength="6" maxlength="100" autocomplete="current-password">
            <button class="eye-toggle" type="button" data-target="loginPassword" aria-label="Show password">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M2 4.27 3.28 3l17.72 18-1.28 1.27-3.02-3.06A11.95 11.95 0 0 1 12 20C7 20 2.73 16.89 1 12c.8-2.24 2.2-4.2 4.02-5.65L2 4.27Zm6.56 6.66a3.99 3.99 0 0 0 4.51 4.55l-4.5-4.55ZM12 6c5 0 9.27 3.11 11 8a12.6 12.6 0 0 1-2.9 4.48l-2.17-2.2A6 6 0 0 0 9.72 8.1L7.89 6.25A12.5 12.5 0 0 1 12 6Zm0 3a3 3 0 0 1 2.96 3.45l-3.4-3.44c.14-.01.29-.01.44-.01Z"/>
              </svg>
            </button>
          </div>

          <button class="primary-button" type="submit">Login</button>
          <button class="google-button" type="button">
            <svg viewBox="0 0 48 48" aria-hidden="true">
              <path fill="#FFC107" d="M43.611 20.083H42V20H24v8h11.303C33.655 32.657 29.231 36 24 36c-6.627 0-12-5.373-12-12S17.373 12 24 12c3.059 0 5.842 1.154 7.961 3.039l5.657-5.657C34.053 6.053 29.277 4 24 4 12.955 4 4 12.955 4 24s8.955 20 20 20 20-8.955 20-20c0-1.341-.138-2.65-.389-3.917Z"/>
              <path fill="#FF3D00" d="M6.306 14.691 12.88 19.51A11.96 11.96 0 0 1 24 12c3.059 0 5.842 1.154 7.961 3.039l5.657-5.657C34.053 6.053 29.277 4 24 4c-7.682 0-14.347 4.337-17.694 10.691Z"/>
              <path fill="#4CAF50" d="M24 44c5.176 0 9.86-1.977 13.409-5.193l-6.19-5.238A11.94 11.94 0 0 1 24 36c-5.21 0-9.623-3.316-11.283-7.946l-6.525 5.027C9.5 39.556 16.227 44 24 44Z"/>
              <path fill="#1976D2" d="M43.611 20.083H42V20H24v8h11.303a12.05 12.05 0 0 1-4.084 5.569l.003-.002 6.19 5.238C36.971 39.193 44 34 44 24c0-1.341-.138-2.65-.389-3.917Z"/>
            </svg>
            <span>Continue with Google</span>
          </button>
          <p class="form-status" id="loginStatus" aria-live="polite"></p>
        </form>

        <form class="form-panel" id="signupPanel" novalidate>
          <label class="field-label" for="signupName">Full Name</label>
          <input class="field-input" id="signupName" type="text" required minlength="3" maxlength="40" pattern="[A-Za-z ]{3,40}" autocomplete="name">

          <label class="field-label" for="signupEmail">Email Id</label>
          <input class="field-input" id="signupEmail" type="email" required maxlength="80" autocomplete="email">

          <label class="field-label" for="signupPassword">Password</label>
          <div class="password-wrap">
            <input class="field-input" id="signupPassword" type="password" required minlength="6" maxlength="100" pattern="^(?=.*[A-Za-z])(?=.*\d).{6,100}$" autocomplete="new-password">
            <button class="eye-toggle" type="button" data-target="signupPassword" aria-label="Show password">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M2 4.27 3.28 3l17.72 18-1.28 1.27-3.02-3.06A11.95 11.95 0 0 1 12 20C7 20 2.73 16.89 1 12c.8-2.24 2.2-4.2 4.02-5.65L2 4.27Zm6.56 6.66a3.99 3.99 0 0 0 4.51 4.55l-4.5-4.55ZM12 6c5 0 9.27 3.11 11 8a12.6 12.6 0 0 1-2.9 4.48l-2.17-2.2A6 6 0 0 0 9.72 8.1L7.89 6.25A12.5 12.5 0 0 1 12 6Zm0 3a3 3 0 0 1 2.96 3.45l-3.4-3.44c.14-.01.29-.01.44-.01Z"/>
              </svg>
            </button>
          </div>

          <label class="field-label" for="signupMobile">Mobile Number</label>
          <input class="field-input" id="signupMobile" type="tel" required inputmode="numeric" pattern="[0-9]{10}" minlength="10" maxlength="10" autocomplete="tel">

          <button class="primary-button" type="submit">Signup</button>
          <button class="google-button" type="button">
            <svg viewBox="0 0 48 48" aria-hidden="true">
              <path fill="#FFC107" d="M43.611 20.083H42V20H24v8h11.303C33.655 32.657 29.231 36 24 36c-6.627 0-12-5.373-12-12S17.373 12 24 12c3.059 0 5.842 1.154 7.961 3.039l5.657-5.657C34.053 6.053 29.277 4 24 4 12.955 4 4 12.955 4 24s8.955 20 20 20 20-8.955 20-20c0-1.341-.138-2.65-.389-3.917Z"/>
              <path fill="#FF3D00" d="M6.306 14.691 12.88 19.51A11.96 11.96 0 0 1 24 12c3.059 0 5.842 1.154 7.961 3.039l5.657-5.657C34.053 6.053 29.277 4 24 4c-7.682 0-14.347 4.337-17.694 10.691Z"/>
              <path fill="#4CAF50" d="M24 44c5.176 0 9.86-1.977 13.409-5.193l-6.19-5.238A11.94 11.94 0 0 1 24 36c-5.21 0-9.623-3.316-11.283-7.946l-6.525 5.027C9.5 39.556 16.227 44 24 44Z"/>
              <path fill="#1976D2" d="M43.611 20.083H42V20H24v8h11.303a12.05 12.05 0 0 1-4.084 5.569l.003-.002 6.19 5.238C36.971 39.193 44 34 44 24c0-1.341-.138-2.65-.389-3.917Z"/>
            </svg>
            <span>Continue with Google</span>
          </button>
          <p class="form-status" id="signupStatus" aria-live="polite"></p>
        </form>
      </section>
    </section>
  </main>

  <script src="../../assets/js/auth.js"></script>
</body>
</html>
