spring:
  datasource:
    url: jdbc:mysql://${DB_HOST:mysql}:3306/measurementdb?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${DB_USER:root}
    password: ${DB_PASS:rootpassword}
  h2:
    console:
      enabled: false
  jpa:
    hibernate:
      ddl-auto: update
