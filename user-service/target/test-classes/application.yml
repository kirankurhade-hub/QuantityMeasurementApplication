eureka:
  client:
    enabled: false

spring:
  datasource:
    url: jdbc:h2:mem:userdb-test;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: test-client-id
            client-secret: test-client-secret
  cloud:
    compatibility-verifier:
      enabled: false
